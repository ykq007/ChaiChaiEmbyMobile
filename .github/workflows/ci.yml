name: Android CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android 17 SDK
        run: sdkmanager 'platforms;android-37.0' 'build-tools;36.0.0'
      - name: Build, lint, and unit test
        run: ./gradlew verifyModuleGraph dependencies test lint assembleRelease --stacktrace

  ui-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: '26'
            target: google_apis
          - api-level: '37.0'
            target: google_apis_ps16k
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan dependencies and repository for high or critical vulnerabilities
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
