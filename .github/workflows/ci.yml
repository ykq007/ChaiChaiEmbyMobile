name: Android CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android 17 SDK
        run: sdkmanager 'platforms;android-37.0' 'build-tools;36.0.0'
      - name: Validate CI workflow action references and emulator safeguards
        run: ./scripts/check-ci-workflow.sh
      - name: Build, lint, and unit test
        run: ./gradlew verifyModuleGraph dependencies test lint assembleRelease --stacktrace

  ui-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: '26'
            target: google_apis
            profile: pixel_2
            script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.notAnnotation=dev.chaichai.mobile.RequiresLargeTestWindow
          - api-level: '37.0'
            target: google_apis
            profile: pixel_c
            script: ./gradlew connectedDebugAndroidTest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          disable-animations: true
          script: ${{ matrix.script }}
      - name: Collect UI smoke failure diagnostics
        if: failure()
        run: |
          mkdir -p ci-diagnostics
          adb devices -l > ci-diagnostics/adb-devices.txt 2>&1 || true
          timeout 10s adb logcat -d > ci-diagnostics/logcat.txt 2>&1 || true
          timeout 10s adb shell getprop > ci-diagnostics/device-properties.txt 2>&1 || true
          emulator -accel-check > ci-diagnostics/emulator-acceleration.txt 2>&1 || true
          ls -la /dev/kvm > ci-diagnostics/kvm-device.txt 2>&1 || true
          ps aux > ci-diagnostics/processes.txt 2>&1 || true
          df -h > ci-diagnostics/disk.txt 2>&1 || true
          free -h > ci-diagnostics/memory.txt 2>&1 || true
      - name: Retain UI smoke failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-${{ matrix.api-level }}-${{ matrix.target }}-diagnostics
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
            /tmp/android-runner/**
            ci-diagnostics/**
          if-no-files-found: warn
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan dependencies and repository for high or critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
      - name: Scan repository history for secrets
        if: always()
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
