name: Release

# Tag-triggered release qualification for the First Viewing Loop milestone.
# A clean run on a v* tag proves the approved Quality Gates, produces a signed
# release APK with checksums, provenance, an SBOM, and a dependency/license
# report, captures install/upgrade smoke evidence, and publishes a GitHub
# Release only when the machine-readable Quality Gate report permits it.
# Critical failures are never waived (enforced by scripts/quality_gate_report.py).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run every gate but do not publish a GitHub Release'
        type: boolean
        default: true

permissions:
  contents: read

env:
  ANDROID_SDK_PACKAGES: "platforms;android-37.0 build-tools;36.0.0"

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate CI and release workflow action references
        run: |
          ./scripts/check-ci-workflow.sh
          ./scripts/check-ci-workflow.sh release.yml

  build-and-gate:
    runs-on: ubuntu-latest
    needs: validate-workflows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager ${{ env.ANDROID_SDK_PACKAGES }}
      - name: Verify module graph, unit test, lint (compatibility contracts)
        run: ./gradlew verifyModuleGraph dependencies test lint --stacktrace
      - name: Record compatibility gate result
        if: success()
        run: |
          mkdir -p quality-gate
          cat > quality-gate/compatibility.json <<'JSON'
          {"status":"pass","detail":"Supported Server Line contract + unit suites green","artifacts":["**/build/reports/tests/**"]}
          JSON
      - name: Record compatibility gate failure
        if: failure()
        run: |
          mkdir -p quality-gate
          echo '{"status":"fail","detail":"unit/contract/lint gate failed"}' > quality-gate/compatibility.json
      - name: Upload gate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-build
          path: quality-gate/**
          if-no-files-found: warn
      - name: Upload test reports for privacy scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-build
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: warn

  instrumentation:
    runs-on: ubuntu-latest
    needs: validate-workflows
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: '26'
            profile: pixel_2
            lane: compact
            script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.notAnnotation=dev.chaichai.mobile.RequiresLargeTestWindow
          - api-level: '36'
            profile: pixel_c
            lane: expanded
            script: ./gradlew connectedDebugAndroidTest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Acceptance suite (${{ matrix.lane }} lane, API ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.profile }}
          disable-animations: true
          script: ${{ matrix.script }}
      - name: Record acceptance lane result
        if: success()
        run: |
          mkdir -p quality-gate
          echo '{"status":"pass","detail":"acceptance suite green on the ${{ matrix.lane }} lane (API ${{ matrix.api-level }})"}' \
            > quality-gate/lane-${{ matrix.lane }}.json
      - name: Record acceptance lane failure
        if: failure()
        run: |
          mkdir -p quality-gate
          echo '{"status":"fail","detail":"acceptance suite failed on the ${{ matrix.lane }} lane (API ${{ matrix.api-level }})"}' \
            > quality-gate/lane-${{ matrix.lane }}.json
      - name: Upload lane gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-lane-${{ matrix.lane }}
          path: quality-gate/**
          if-no-files-found: warn
      - name: Upload lane reports for privacy scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-lane-${{ matrix.lane }}
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: warn

  endurance:
    runs-on: ubuntu-latest
    needs: validate-workflows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: 30-cycle playback endurance + cold-start timing (API 26)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: '26'
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: ./scripts/run-endurance-and-perf.sh
      - name: Record endurance gate failure if the emulator never produced a result
        if: failure()
        run: |
          mkdir -p quality-gate
          [ -f quality-gate/playback-endurance.json ] || \
            echo '{"status":"fail","detail":"endurance job failed before producing a result (emulator boot or build failure)"}' > quality-gate/playback-endurance.json
          [ -f quality-gate/performance.json ] || \
            echo '{"status":"not-run","detail":"performance sample not produced; endurance job failed early"}' > quality-gate/performance.json
      - name: Upload endurance and performance gate results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-endurance
          path: quality-gate/**
          if-no-files-found: warn

  supply-chain:
    runs-on: ubuntu-latest
    needs: validate-workflows
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan dependencies and repository for high or critical vulnerabilities
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
      - name: Scan repository history for secrets
        id: gitleaks
        if: always()
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Record supply-chain gate result
        if: success()
        run: |
          mkdir -p quality-gate
          echo '{"status":"pass","detail":"no HIGH/CRITICAL dependency findings and no leaked secrets"}' > quality-gate/supply-chain.json
      - name: Record supply-chain gate failure
        if: failure()
        run: |
          mkdir -p quality-gate
          echo '{"status":"fail","detail":"dependency vulnerability or secret scan reported findings"}' > quality-gate/supply-chain.json
      - name: Upload supply-chain gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-supply-chain
          path: quality-gate/**
          if-no-files-found: warn

  package:
    runs-on: ubuntu-latest
    needs: build-and-gate
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager ${{ env.ANDROID_SDK_PACKAGES }}
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is required to sign the release APK." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
      - name: Assemble signed release APK, dependency and license report
        env:
          CHAICHAI_RELEASE_KEYSTORE: ${{ runner.temp }}/release.keystore
          CHAICHAI_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          CHAICHAI_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          CHAICHAI_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease :app:dependencies --stacktrace
          mkdir -p release-staging
          find app/build/outputs/apk/release -name '*.apk' -exec cp {} release-staging/ \;
          # Human- and machine-readable dependency / license inventory from the locked graph.
          {
            echo "# Dependency and license report"
            echo
            echo "Generated from the fully locked dependency graph."
            echo
            for lockfile in $(git ls-files '*.lockfile'); do
              echo "## $lockfile"
              echo '```'
              grep -vE '^#|^empty=' "$lockfile" | sort -u
              echo '```'
            done
          } > release-staging/dependency-license-report.md
      - name: Verify the release APK is signed
        run: |
          APK=$(find release-staging -name '*.apk' | head -n1)
          "$ANDROID_HOME"/build-tools/36.0.0/apksigner verify --print-certs "$APK"
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release-staging/sbom.cyclonedx.json
      - name: Compute checksums
        run: |
          cd release-staging
          sha256sum * > SHA256SUMS.txt
      - name: Attest build provenance for the release APK
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-staging/*.apk
      - name: Record release-integrity gate result
        if: success()
        run: |
          mkdir -p quality-gate
          cat > quality-gate/release-integrity.json <<'JSON'
          {"status":"pass","detail":"signed APK, checksums, SBOM, provenance attestation, and dependency/license report produced","artifacts":["release-staging/SHA256SUMS.txt","release-staging/sbom.cyclonedx.json","release-staging/dependency-license-report.md"]}
          JSON
      - name: Record release-integrity gate failure
        if: failure()
        run: |
          mkdir -p quality-gate
          echo '{"status":"fail","detail":"release packaging or signing failed"}' > quality-gate/release-integrity.json
      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-staging
          path: release-staging/**
          if-no-files-found: warn
      - name: Upload release-integrity gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-package
          path: quality-gate/**
          if-no-files-found: warn

  install-upgrade-smoke:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-staging
          path: release-staging
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install then upgrade the signed APK on API 26
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: '26'
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: ./scripts/run-install-upgrade-smoke.sh
      - name: Upload install/upgrade gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-results-smoke
          path: quality-gate/**
          if-no-files-found: warn

  qualify-and-publish:
    runs-on: ubuntu-latest
    needs: [build-and-gate, instrumentation, endurance, supply-chain, package, install-upgrade-smoke]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: incoming
      - name: Collect gate results and reports
        run: |
          mkdir -p quality-gate reports release-staging
          find incoming -path '*/gate-results-*/*.json' -exec cp {} quality-gate/ \;
          # Coalesce per-lane acceptance results into the instrumentation-backed gates.
          # Every contributing lane must pass for the gate to pass (fail-closed).
          python3 scripts/coalesce_lane_gates.py quality-gate
          cp -r incoming/reports-* reports/ 2>/dev/null || true
          cp -r incoming/release-staging/* release-staging/ 2>/dev/null || true
          ls -la quality-gate
      - name: Privacy Quality Gate — scan all artifacts
        run: |
          set +e
          ./scripts/scan-release-privacy.sh \
            --out quality-gate/privacy.json \
            --denylist docs/release/privacy-denylist.txt \
            reports release-staging quality-gate
          echo "privacy scan exit: $?"
      - name: Generate machine-readable Quality Gate report
        id: gate
        run: |
          set +e
          python3 scripts/quality_gate_report.py \
            --catalog docs/release/quality-gates.json \
            --results quality-gate \
            --waivers docs/release/waivers.json \
            --out quality-gate-report.json \
            --summary quality-gate-report.md
          echo "status=$?" >> "$GITHUB_OUTPUT"
          cat quality-gate-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Quality Gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: |
            quality-gate-report.json
            quality-gate-report.md
            quality-gate/**
      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' && steps.gate.outputs.status == '0' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-staging/*.apk
            release-staging/SHA256SUMS.txt
            release-staging/sbom.cyclonedx.json
            release-staging/dependency-license-report.md
            quality-gate-report.json
            quality-gate-report.md
          body_path: quality-gate-report.md
          fail_on_unmatched_files: false
      - name: Fail the run when a Quality Gate blocks release
        if: ${{ steps.gate.outputs.status != '0' }}
        run: |
          echo "::error::A critical Quality Gate is blocking. See quality-gate-report.md." >&2
          exit 1
